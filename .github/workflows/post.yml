name: Cyber Case Files - Auto Post

on:
  schedule:
    - cron: '*/10 * * * *'
    - cron: '15 5,15 * * *'
    - cron: '30 9 * * *'
    - cron: '45 12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run manually'
        required: true
        default: 'news'
        type: choice
        options: [news, cve, bounty, breach]

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Restore posted_history.db
        run: |
          if [ ! -f posted_history.db ]; then
            touch posted_history.db
          fi

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            MIN=$(date -u +%M)
            HOUR=$(date -u +%H)
            if [ "$HOUR-$MIN" = "05-15" ] || [ "$HOUR-$MIN" = "15-15" ]; then
              echo "mode=cve" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR-$MIN" = "09-30" ]; then
              echo "mode=bounty" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR-$MIN" = "12-45" ]; then
              echo "mode=breach" >> "$GITHUB_OUTPUT"
            else
              echo "mode=news" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python main.py ${{ steps.mode.outputs.mode }}

      - name: Commit updated posted_history.db
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posted_history.db
          git diff --cached --quiet || git commit -m "Update posted history [skip ci]"
          git push
