name: Cyber Case Files - Auto Post

on:
  schedule:
    - cron: '*/10 * * * *'   # single trigger: checks EVERY category every 10 min
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run manually (auto = normal 10-min behavior, right now)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - news
          - cve
          - bounty
          - breach
          - phishing
          - threat_actor
          - patch_tuesday
          - leaked_creds
          - quiz

concurrency:
  group: cyber-case-files-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Restore posted_history.db
        run: |
          if [ ! -f posted_history.db ]; then
            touch posted_history.db
          fi

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: python main.py ${{ steps.mode.outputs.mode }}

      - name: Commit updated history + feed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posted_history.db feed.xml
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Update posted history + feed [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          fi
