name: Post to Cyber Case Files Telegram Channel

on:
  schedule:
    # Times are UTC. IST = UTC+5:30.
    - cron: "30 4 * * *"   # 10:00 AM IST -> CVE batch
    - cron: "30 7 * * *"   # 1:00 PM IST  -> News batch
    - cron: "30 11 * * *"  # 5:00 PM IST  -> Bug bounty batch
  workflow_dispatch:
    inputs:
      mode:
        description: "Which content type to post (for manual testing)"
        required: true
        default: "cve"
        type: choice
        options:
          - cve
          - news
          - bounty

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted-history database
        uses: actions/cache@v4
        with:
          path: posted_history.db
          key: posted-history-db

      - name: Determine mode from schedule
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 4 * * *" ]; then
            echo "mode=cve" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 7 * * *" ]; then
            echo "mode=news" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 11 * * *" ]; then
            echo "mode=bounty" >> "$GITHUB_OUTPUT"
          else
            echo "mode=news" >> "$GITHUB_OUTPUT"
          fi

      - name: Post batch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python main.py ${{ steps.mode.outputs.mode }}

      - name: Save posted-history database
        uses: actions/cache/save@v4
        with:
          path: posted_history.db
          key: posted-history-db-${{ github.run_id }}
